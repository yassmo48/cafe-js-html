<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <title>Responsive Coffee Website</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Miniver&display=swap" rel="stylesheet">

    <style>
        body {

font-family: Arial;

background: #f5f5f5;

display: flex;

justify-content: center;

padding-top: 50px;

}

.container {

background: white;

padding: 25px;

width: 320px;

border-radius: 10px;

box-shadow: 0 0 10px rgba(0,0,0,0.1);

}

input, select {

width: 100%;

margin: 8px 0;

padding: 10px;

}

button {

width: 100%;

padding: 12px;

background: #3b141c;

color: white;

border: none;

cursor: pointer;

}

h3 {

margin-top: 20px;

color: #3b141c;

font-size: 16px;

}

.payment-options {

margin-top: 10px;

background: #faf4f5;

padding: 10px;

border-radius: 10px;

}

.payment-options label {

display: block;

margin: 8px 0;

cursor: pointer;

font-size: 14px;

}

.payment-options input {

margin-right: 8px;

}
    </style>

</head>

<body>

    <header>
        <nav class="navbar section-content">
            <a href="#" class="nav-logo">
                <h2 class="logo-text"> coffee</h2>
            </a>
            <ul class=" nav-menu">
                <li><a href="#" class="nav-link">Home</a></li>
                <li><a href="#" class="nav-link">About</a></li>
                <li><a href="#" class="nav-link">Menu</a></li>
                <li><a href="#" class="nav-link">testimonials</a></li>
                <li><a href="#" class="nav-link">Gallery</a></li>
                <li><a href="#" class="nav-link">Contacts</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h2>Online Food booking</h2>
        <div class="container">
            <label> Item name</label>
            <select id="item">
                <option value="1.50">Cappucino - 1.50£</option>
                <option value="7.99">Burger - 7.99£</option>
                <option value="4.99">Chips - 4.99£</option>
                <option value="2">Iced coffee - 2.00£</option>
                <option value="5">Chocolate brownies - 5.00£</option>
            </select>
            <label>Quantity</label>
            <input type="number" id="qty" value="1" min="1">
             <label>Total Price</label>
             <input type="text" id="price" readonly>

             <h3>Customer Details</h3>
             <input type="text" id="address" placeholder="Delivery address">
            <input type="text" id="mobile" placeholder="Mobile number">
            <input type="email" id="email" placeholder="Email address">

            <button onclick="Checkout()"><a href="checkout.html">Checkout</a></button>
            
        </div>
        <script src="order.js"></script>
    </main>

    <section class="footer-section">
        <div class="section-content">
            <p class="copyright-text">2024 coffee Shop</p>
            <div class="social-link-list">
                <a href="#" class="social-link"><i class="fa-brands fa-facebook"></i></a>
                <a href="#" class="social-link"><i class="fa-brands fa-intagram"></i></a>
                <a href="#" class="social-link"><i class="fa-brands fa-twitter"></i></a>
            </div>
            <p class="policy-text">
                <a href="#" class="policy-link">Privacy Policy</a>
                <span class="separator"></span>
                <a href="#" class="policy-link">Terms of Service</a>
            </p>
        </div>
    </section>
    </main>
    
    
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    
    </body>
    
    </html>
