<!DOCTYPE html>
<html>
    <head>
        <title>Ckeckout html</title>
        <link rel="stylesheet" href="order.css">
    </head>
    <style>
        body{
            margin: 0;
            padding:0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #3b141c, #6b2d36);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }


        .container{
            background: white;
            width:360px ;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: fadeIn 0.4s ease-in-out;

        }
        h2{
            text-align: center;
            color: #3b141c;
            margin: bottom 20px;
        }
        
        #summary{
            background:#faf4f5 ;
            padding: 15px;
            border-radius: 10px;
            line-height: 1.6;
            font-size: 14px;
            color: #333;
        }
        button{
            width: 100%;
    margin-top: 20px;
    padding: 12px;
    border: none;
    border-radius: 25px;
    background: #3b141c;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
        }
        button:hover{
            background: #6b2d36;
            transform: scale(1.03);
        }
        b{
            color:#3b141c ;

        }
        @keyframes fadeIn {
            from{
                opacity: 0;
                transform: translateY(10px);
            }
            to{
                opacity: 1;
                transform: translateY(0);
            }
            
        }
    </style>
    </head>
    <body>
        <div class="container">
            <h2>Order Summary</h2>

            <p id="summary"></p>
            <button onclick="confirmOrder()">Confirm Order</button>
        </div>
        <script>
            const data = JSON.parse(localStorage.getItem("order"));

            document.getElementById("summary").innerHtml = `
            <b>Item:<b>$(data.itemText)<br>
            <b>Quantity:<b>$(data.quantity)<br>
            <b>Total:<b>$(data.total)<br><br>
            <b>Address:<b>$(data.address)<br>
            <b>Mobile:<b>$(data.mobile)<br>
            <b>Email:<b>$(data.email)
            `;


            function confirmOrder(){
                alert("order Placed Successfully!");
                localStorage.clear();
            }

            

        </script>
    </body>
</html>
